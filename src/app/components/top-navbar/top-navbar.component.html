<nav class="nav-bar">
  <div class="nav-bar-logo">
    <img src="assets/images/book-open-svgrepo-com.svg" alt="Contrarian Reads" width="24" height="39">
    <span>Contrarian</span>Reads
  </div>
  <button class="hamburger" (click)="toggleMenu()" [class.open]="menuOpen" aria-label="Toggle menu">
    <span></span>
    <span></span>
    <span></span>
  </button>
</nav>
<div class="nav-actions" [class.show]="menuOpen">
  <div class="nav-bar-actions">
    <button class="theme-toggle" (click)="toggleDarkMode()" title="Toggle dark mode">
      {{ isDarkMode ? '☀️' : '🌙' }}
    </button>
    <button (click)="openAddAlternativeModal(); menuOpen = false">
      <svg class="btn-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="12" y1="5" x2="12" y2="19"/>
        <line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
      Add Alternative
    </button>
    <button (click)="openUserProfileModal(); menuOpen = false">
      <svg class="btn-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="8" r="4"/>
        <path d="M4 20c0-4 4-7 8-7s8 3 8 7"/>
      </svg>
      My profile
    </button>
    <button (click)="onLogout(); menuOpen = false">
      <svg class="btn-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
        <polyline points="16 17 21 12 16 7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
      Logout
    </button>
  </div>
</div>
