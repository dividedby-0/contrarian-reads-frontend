<nav class="nav-bar">
  <div class="nav-bar-logo">
    <img src="assets/images/book-open-svgrepo-com.svg" alt="Contrarian Reads" width="24" height="39">
    <span>Contrarian</span>Reads
  </div>
  <button class="hamburger" (click)="toggleMenu()" [class.open]="menuOpen" aria-label="Toggle menu">
    <span></span>
    <span></span>
    <span></span>
  </button>
</nav>
<div class="nav-actions" [class.show]="menuOpen">
  <div class="nav-bar-actions">
    <button class="theme-toggle" (click)="toggleDarkMode(); menuOpen = false" title="Toggle dark mode">
      <span class="btn-icon" *ngIf="!isDarkMode">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="5"/>
          <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
        </svg>
      </span>
      <span class="btn-icon" *ngIf="isDarkMode">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </span>
      <span class="theme-label">Dark mode</span>
    </button>
    <button (click)="openAddAlternativeModal(); menuOpen = false" title="Suggest an alternative book">
      <svg class="btn-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="12" y1="5" x2="12" y2="19"/>
        <line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
      Add Alternative
    </button>
    <button (click)="openUserProfileModal(); menuOpen = false" title="View your profile">
      <svg class="btn-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="8" r="4"/>
        <path d="M4 20c0-4 4-7 8-7s8 3 8 7"/>
      </svg>
      My profile
    </button>
    <hr class="menu-divider">
    <button (click)="onLogout(); menuOpen = false" title="Sign out of your account">
      <svg class="btn-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
        <polyline points="16 17 21 12 16 7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
      Logout
    </button>
  </div>
</div>
